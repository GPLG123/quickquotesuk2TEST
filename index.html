<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Driver Daily Report ATR</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:20px;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input,select,textarea{
margin-top:4px;
margin-bottom:10px;
padding:6px;
width:220px;
}

textarea{
width:100%;
height:50px;
}

button{
padding:8px 15px;
margin-top:10px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:14px;
}

th,td{
border:1px solid #888;
padding:6px;
text-align:center;
}

th{
background:#eee;
}

</style>

</head>

<body>

<h2>Driver Daily Report ATR</h2>

<label>Vehicle</label>
<input id="vehicle">

<label>Run</label>
<input id="run">

<label>Specification</label>
<select id="specification">
<option value="">Select</option>
<option>Collection Only</option>
<option>Delivery Only</option>
<option>Collection and Delivery</option>
</select>

<label>Location</label>
<select id="location">
<option value="">Select</option>
<option>AC</option>
<option>ASC</option>
<option>BA WC</option>
<option>LANDMARK GLOBAL</option>
<option>Swissport</option>
<option>BREAK</option>
<option value="manual">Other Manual</option>
</select>

<input id="manualLocation" style="display:none" placeholder="Manual location">

<label>Arrival</label>
<input type="time" id="arrival">

<label>Booking</label>
<input type="time" id="booking">

<label>Loading</label>
<input type="time" id="loading">

<label>Departure</label>
<input type="time" id="departure">

<label>Comment</label>
<textarea id="comment"></textarea>

<button onclick="addEntry()">Add Location</button>

<hr>

<button onclick="downloadExcel()">Download Excel</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Vehicle</th>
<th>Run</th>
<th>Location</th>
<th>Arrival</th>
<th>Booking</th>
<th>Loading</th>
<th>Departure</th>
<th>Specification</th>
<th>Comment</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

let jobs=[];

document.getElementById("location").onchange=function(){
document.getElementById("manualLocation").style.display=
this.value==="manual"?"block":"none";
};

function addEntry(){

let vehicle=vehicleInput.value.trim();
let run=runInput.value.trim();

let spec=specification.value;

let locationSelect=location.value;
let manual=document.getElementById("manualLocation").value.trim();

let locationFinal=locationSelect==="manual"?manual:locationSelect;

if(!vehicle||!run||!spec||!locationFinal){
alert("Complete required fields");
return;
}

jobs.push({
date:new Date().toISOString().split("T")[0],
vehicle,
run,
location:locationFinal,
arrival:arrival.value,
booking:booking.value,
loading:loading.value,
departure:departure.value,
specification:spec,
comment:comment.value
});

renderTable();
}

function renderTable(){

let tbody=document.getElementById("tableBody");
tbody.innerHTML="";

jobs.forEach((j,index)=>{

let row=tbody.insertRow();

Object.values(j).forEach(v=>{
row.insertCell().textContent=v;
});

let del=row.insertCell();

let btn=document.createElement("button");
btn.innerText="❌";

btn.onclick=()=>{
jobs.splice(index,1);
renderTable();
};

del.appendChild(btn);

});

}

function downloadExcel(){

if(jobs.length===0){
alert("No data");
return;
}

let headers=[
"Date","Vehicle","Run","Location",
"Arrival","Booking","Loading","Departure",
"Specification","Comment"
];

let rows=[headers];

jobs.forEach(j=>{
rows.push(Object.values(j));
});

let ws=XLSX.utils.aoa_to_sheet(rows);
let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Report");

let filename="Driver_Report_"+new Date().toISOString().split("T")[0];

XLSX.writeFile(wb,filename+".xlsx");
}

</script>

</body>
</html>
