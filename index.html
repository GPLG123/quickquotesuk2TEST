<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Driver Daily Report ATR</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:20px;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input,select,textarea{
padding:6px;
width:220px;
margin-bottom:8px;
}

textarea{
width:100%;
height:50px;
}

button{
padding:8px 14px;
margin-top:10px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #888;
padding:6px;
text-align:center;
}

th{
background:#eee;
}

</style>

</head>

<body>

<h2>Driver Daily Report ATR</h2>

<label>Vehicle</label>
<input id="vehicle">

<label>Run</label>
<input id="run">

<label>Specification</label>
<select id="specification">
<option value="">Select</option>
<option>Collection Only</option>
<option>Delivery Only</option>
<option>Collection and Delivery</option>
</select>

<label>Location</label>
<select id="location">
<option value="">Select</option>
<option>AC</option>
<option>ASC</option>
<option>BA WC</option>
<option>DAI</option>
<option>LANDMARK GLOBAL</option>
<option>Swissport</option>
<option>BREAK</option>
<option value="manual">Other (Manual)</option>
</select>

<input id="manualLocation" placeholder="Manual location"
style="display:none;width:220px">

<label>Arrival</label>
<input type="time" id="arrival">

<label>Booking</label>
<input type="time" id="booking">

<label>Loading</label>
<input type="time" id="loading">

<label>Departure</label>
<input type="time" id="departure">

<label>Comment</label>
<textarea id="comment"></textarea>

<button id="addEntryBtn">Add Location</button>

<hr>

<input type="date" id="filterDate">

<div style="margin-top:15px">
<button id="downloadBtn" style="background:#4CAF50;color:white">
Download Excel
</button>

<button id="sendGSheetBtn"
style="background:#2196F3;color:white;margin-left:10px">
Send to Google Sheet
</button>
</div>

<table id="reportTable">
<thead>
<tr>
<th>Date</th>
<th>Vehicle</th>
<th>Run</th>
<th>Location</th>
<th>Arrival</th>
<th>Booking</th>
<th>Loading</th>
<th>Departure</th>
<th>Specification</th>
<th>Comment</th>
</tr>
</thead>

<tbody></tbody>
</table>

<script>

/* STORAGE */
const STORAGE_KEY="ATR_dailyData";

/* API URL YOUR DEPLOYMENT */
const API_URL="https://script.google.com/macros/s/AKfycby-SnwoyA64hP1isOMEySamBIY7iwjm2E1FJcvyVd0Rj9_hSiBA4pMv_OudIQfOCMxBpw/exec";

/* DATA LOAD */
let dailyData=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");

/* Manual location */
document.getElementById("location").addEventListener("change",function(){
document.getElementById("manualLocation").style.display=
this.value==="manual" ? "block":"none";
});

/* Load table */
function loadTable(date){

const tbody=document.querySelector("#reportTable tbody");
tbody.innerHTML="";

if(!dailyData[date]) return;

Object.values(dailyData[date]).flat().forEach(entry=>{

let row=tbody.insertRow();

row.insertCell().textContent=entry.date;
row.insertCell().textContent=entry.vehicle;
row.insertCell().textContent=entry.run;
row.insertCell().textContent=entry.location;
row.insertCell().textContent=entry.arrival;
row.insertCell().textContent=entry.booking;
row.insertCell().textContent=entry.loading;
row.insertCell().textContent=entry.departure;
row.insertCell().textContent=entry.specification;
row.insertCell().textContent=entry.comment;

});

}

/* Add Entry */
addEntryBtn.onclick=function(){

let vehicle=document.getElementById("vehicle").value.trim();
let run=document.getElementById("run").value.trim();
let specification=document.getElementById("specification").value;

let locationSelect=document.getElementById("location");

let locationValue =
locationSelect.value==="manual"
? document.getElementById("manualLocation").value.trim()
: locationSelect.value;

if(!vehicle||!run||!locationValue||!specification){
alert("Fill required fields");
return;
}

let date=new Date().toISOString().split("T")[0];

if(!dailyData[date]) dailyData[date]={};
if(!dailyData[date][run]) dailyData[date][run]=[];

dailyData[date][run].push({
date,
vehicle,
run,
location:locationValue,
arrival:arrival.value,
booking:booking.value,
loading:loading.value,
departure:departure.value,
specification,
comment:comment.value
});

localStorage.setItem(STORAGE_KEY,JSON.stringify(dailyData));

loadTable(date);

};

/* Download Excel */
downloadBtn.onclick=function(){

let date=filterDate.value;

if(!dailyData[date]){
alert("No data");
return;
}

let rows=[];

Object.values(dailyData[date]).forEach(runArr=>{
runArr.forEach(entry=>{
rows.push([
entry.date,
entry.vehicle,
entry.run,
entry.location,
entry.arrival,
entry.booking,
entry.loading,
entry.departure,
entry.specification,
entry.comment
]);
});
});

if(rows.length===0){
alert("No rows");
return;
}

const sheetData=[
["Date","Vehicle","Run","Location","Arrival","Booking","Loading","Departure","Specification","Comment"],
...rows
];

const ws=XLSX.utils.aoa_to_sheet(sheetData);
const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Report");

XLSX.writeFile(wb,"ATR_Report_"+date+".xlsx");

};

/* Send Google Sheet */
sendGSheetBtn.onclick=function(){

let date=filterDate.value;

if(!dailyData[date]){
alert("No data to send");
return;
}

let entries=[];
Object.values(dailyData[date]).forEach(runArr=>{
entries.push(...runArr);
});

fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({entries})
})
.then(r=>r.text())
.then(()=>alert("Google Sheet Export OK ✅"))
.catch(()=>alert("Send failed ❌"));

};

/* Init */
window.onload=function(){

if(!filterDate.value)
filterDate.value=new Date().toISOString().split("T")[0];

loadTable(filterDate.value);

};

</script>

</body>
</html>
