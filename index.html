<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Driver Daily Report ATR</title>

<style>
body{font-family:Arial;margin:20px;}

label{font-weight:bold;display:block;margin-top:10px;}

input[type="text"],input[type="time"],select,textarea{
margin-top:4px;
margin-bottom:10px;
padding:6px;
width:220px;
}

textarea{width:100%;height:40px;}

button{
padding:8px 15px;
margin-top:10px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:14px;
}

th,td{
border:1px solid #888;
padding:6px;
text-align:center;
}

th{background:#eee;}

.short{width:120px;}

#alertExcel{
margin-top:15px;
background:#f8d7da;
border:1px solid #f5c6cb;
color:#721c24;
padding:10px;
font-weight:bold;
}
</style>

</head>

<body>

<h2>Driver Daily Report ATR</h2>

<label>Vehicle:</label>
<input id="vehicle">

<label>Run:</label>
<input id="run">

<label>Specification:</label>
<select id="specification">
<option value="">Select specification</option>
<option>Collection Only</option>
<option>Delivery Only</option>
<option>Collection and Delivery</option>
</select>

<label>Location:</label>
<select id="location">
<option value="">Select</option>
<option>AC</option>
<option>ASC</option>
<option>BA WC</option>
<option>LANDMARK GLOBAL</option>
<option>Swissport</option>
<option>BREAK</option>
<option value="manual">Other Manual</option>
</select>

<input id="manualLocation" style="display:none" placeholder="Manual location">

<label>Arrival</label>
<input type="time" id="arrival">

<label>Booking</label>
<input type="time" id="booking">

<label>Loading</label>
<input type="time" id="loading">

<label>Departure</label>
<input type="time" id="departure">

<label>Comment</label>
<textarea id="comment"></textarea>

<button onclick="addEntry()">Add Location</button>

<hr>

<label>Select Date</label>
<input type="date" id="filterDate" class="short">

<button onclick="exportGoogleSheet()">Export to Google Sheet</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Vehicle</th>
<th>Run</th>
<th>Location</th>
<th>Arrival</th>
<th>Booking</th>
<th>Loading</th>
<th>Departure</th>
<th>Specification</th>
<th>Comment</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbylgggp-wjd_uMWz5997_7JAEHCUt-0pZoEZLTk_nM/dev";

let jobs=[];

// manual location
document.getElementById("location").onchange=function(){
document.getElementById("manualLocation").style.display=
this.value==="manual"?"block":"none";
};

// add row
function addEntry(){

let vehicle=document.getElementById("vehicle").value.trim();
let run=document.getElementById("run").value.trim();
let specification=document.getElementById("specification").value;

let locationSelect=document.getElementById("location").value;
let manual=document.getElementById("manualLocation").value.trim();

let location=locationSelect==="manual"?manual:locationSelect;

if(!vehicle||!run||!specification||!location){
alert("Complete required fields");
return;
}

let row={
date:document.getElementById("filterDate").value,
vehicle,
run,
location,
arrival:arrival.value,
booking:booking.value,
loading:loading.value,
departure:departure.value,
specification,
comment:comment.value
};

jobs.push(row);

renderTable();
}

// render table
function renderTable(){

let tbody=document.getElementById("tableBody");
tbody.innerHTML="";

jobs.forEach((j,index)=>{

let row=tbody.insertRow();

row.insertCell().textContent=j.date;
row.insertCell().textContent=j.vehicle;
row.insertCell().textContent=j.run;
row.insertCell().textContent=j.location;
row.insertCell().textContent=j.arrival;
row.insertCell().textContent=j.booking;
row.insertCell().textContent=j.loading;
row.insertCell().textContent=j.departure;
row.insertCell().textContent=j.specification;
row.insertCell().textContent=j.comment;

let del=row.insertCell();

let btn=document.createElement("button");
btn.innerText="❌";

btn.onclick=()=>{
jobs.splice(index,1);
renderTable();
};

del.appendChild(btn);

});

}

// export google sheet
async function exportGoogleSheet(){

if(jobs.length===0){
alert("No data to export");
return;
}

try{

let response=await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({entries:jobs})
});

let result=await response.text();

alert("Export status: "+result);

jobs=[];
renderTable();

}catch(e){
alert("Send failed");
}

}

</script>

</body>
</html>
